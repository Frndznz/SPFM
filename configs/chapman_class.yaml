seed: 123
dataset_source: "chapman"
train_loader_type: "standard"
test_loader_type: "standard"

solver:
  name: "Chapman SPFM Classification"
  target: engine.solver_SPFM.SPFMTrainer
  results_folder: ./experiments/Chapman

  # Optimization
  base_lr: 0.0003
  gradient_accumulate_every: 2
  max_steps: 100000
  save_cycle: 10000

  # Loss weights
  lf_loss_weight: 1
  hf_loss_weight: 1
  data_noise_std: 0.02
  
  # Prior for noise sampling
  prior: "white"

  # Exponential Moving Average
  ema:
    decay: 0.995
    update_interval: 10

  # LR Scheduler
  scheduler:
    target: utils.lr_sch.ReduceLROnPlateauWithWarmup
    params:
      factor: 0.5
      patience: 10000
      min_lr: 1.0e-6
      warmup: 1000
      warmup_lr: 1.0e-7

  # Logging
  logger:
    enable_wandb: True
    project: SPFM
    entity: zrfnz
    log_freq: 100

model:
  target: models.FMTS.Flow_Matching_TS
  params:
    feature_size: 12
    sampling_timesteps: 20
    solver: "euler"
  backbones:
    transformer: "transformer_ecg"
    mamba: "mamba_ecg"
    mamformer: "mamformer_ecg"

